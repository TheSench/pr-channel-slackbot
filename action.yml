name: 'PR Channel Slackbot'
description: 'A GitHub Action to check slack channels for PRs that are still open'
branding:
  icon: 'git-pull-request'
  color: 'white'

inputs:
  slack-token:
    description: 'Slack API token'
    required: true
  github-token:
    description: 'GitHub API token'
    required: true
  config-file:
    description: 'Path to JSON Config file'
    required: true
  skip-digest:
    description: 'Skip posting the open PR digest to Slack'
    required: false
    default: 'false'
  state-file:
    description: 'Path to the state file for tracking unresolved PRs and digest threads'
    required: false
    default: './pr-channel-state.json'

runs:
  using: node24
  main: dist/index.mjs